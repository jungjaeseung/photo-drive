proxy_cache_path /var/cache/nginx/media levels=1:2 keys_zone=media_cache:64m max_size=2g inactive=30d use_temp_path=off;

server {
    listen 80;
    server_name _;

    client_max_body_size 0;

    location /photos/media/ {
        alias /storage/media/;
        add_header Cache-Control "public, max-age=31536000, immutable";
        expires 365d;
        try_files $uri =404;
    }

    location / {
        return 404;
    }
}
