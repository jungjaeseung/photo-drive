# home-server nginx.conf / nginx-ssl.conf 의 server { } 블록 안에 추가
# HTTP·HTTPS 둘 다 넣어야 함 (SSL 사용 시 nginx-ssl.conf 필수)
# 정적 파일만 media-nginx로. 상세 /photos/p/{id}는 Next.js로.
# 주의: regex의 { } 는 반드시 따옴표로 감싸야 함

# server 블록 상단(set $wallet_upstream 근처)에 추가:
#   set $photos_upstream photo-drive-app:3000;
#   set $photos_media_upstream photo-drive-media-nginx:80;

location ~ "^/photos/media/[0-9]{4}/[0-9]{2}/[0-9]{2}/" {
    proxy_pass http://$photos_media_upstream;
    proxy_set_header Host $host;
    proxy_cache_bypass $http_cache_control;
}

location /photos {
    proxy_pass http://$photos_upstream;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    client_max_body_size 2G;
}
