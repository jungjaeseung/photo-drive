# home-server nginx.conf에 추가할 스니펫 (참고용)
# /photos → photo-drive-app:3000
# /photos/media/ → photo-drive-media-nginx:80

location /photos/media/ {
    proxy_pass http://photo-drive-media-nginx:80;
    proxy_set_header Host $host;
    proxy_cache_bypass $http_cache_control;
}

location /photos {
    proxy_pass http://photo-drive-app:3000;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    client_max_body_size 2G;
}
